# Production compose.
#
# Secrets are NOT hardcoded here. The names listed below are passed through from
# the host/platform environment into the container by Docker Compose — set their
# values in your environment:
#   GITHUB_CLIENT_ID
#   GITHUB_CLIENT_SECRET
#   GITHUB_REDIRECT_URL
#   JWT_SECRET
# STORAGE_TYPE and DATA_SOURCE_NAME default below; override via the environment
# if needed. DATA_SOURCE_NAME MUST live under /root/data (the only persisted
# path, see volumes), otherwise the SQLite DB is lost on every redeploy.
#
# Data source (where canvases are stored), set once by the deployment team and
# not user-selectable. Authenticated users use STORAGE_BACKEND_AUTHENTICATED;
# logged-out users use STORAGE_BACKEND_ANONYMOUS. Valid values:
# default | indexed-db | kv | s3. Defaults give logged-in users the server
# backend and anonymous users local browser (IndexedDB) storage.
#
# The app listens on 3002; route your domain/reverse proxy to the exposed port.
services:
  excalidraw:
    image: ghcr.io/digitenic-team/excalidraw-full:latest
    # Always re-pull on deploy. The :latest tag is reused across builds, so its
    # content changes while the name stays the same. Without this, `up`/redeploy
    # keeps the locally cached image and silently runs stale code.
    pull_policy: always
    restart: always
    environment:
      - GITHUB_CLIENT_ID
      - GITHUB_CLIENT_SECRET
      - GITHUB_REDIRECT_URL
      - JWT_SECRET
      - STORAGE_TYPE=${STORAGE_TYPE:-sqlite}
      - DATA_SOURCE_NAME=${DATA_SOURCE_NAME:-/root/data/excalidraw.db}
      - STORAGE_BACKEND_AUTHENTICATED=${STORAGE_BACKEND_AUTHENTICATED:-default}
      - STORAGE_BACKEND_ANONYMOUS=${STORAGE_BACKEND_ANONYMOUS:-indexed-db}
      # Access control: when ACCESS_CONTROL_ENABLED=true, only ALLOWED_EMAILS
      # (comma-separated) may obtain a session.
      - ACCESS_CONTROL_ENABLED=${ACCESS_CONTROL_ENABLED:-false}
      - ALLOWED_EMAILS=${ALLOWED_EMAILS:-}
    volumes:
      # Persist ONLY the data dir. Never mount /root: it holds the app binary
      # (/root/main) and a volume there would shadow image updates.
      - excalidraw-data:/root/data
    expose:
      - "3002"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3002/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  excalidraw-data:
